name: Hourly Scrape + Deploy

on:
  schedule:
    - cron: '0 * * * *'  # Every hour UTC
  workflow_dispatch:

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci
      - run: node scripts/autoScraper.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit new articles
        run: |
          git config user.name 'Elesis Bot'
          git config user.email 'bot@insider-hub.local'
          if ! git diff --quiet src/content/news/; then
            git add src/content/news/ .cache/
            git commit -m "🤖 Auto-scrape: $(date -u +%Y-%m-%d-%H%M)"
            git push origin main
          fi

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=insider-hub
