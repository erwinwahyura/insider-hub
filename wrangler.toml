name = "insider-hub"
compatibility_date = "2026-04-16"

# D1 Database - Will be auto-created by CI/CD
[[d1_databases]]
binding = "DB"
database_name = "insider-hub-db"
# database_id will be auto-populated after first deploy

# Environment
[env.production]
vars = { ENVIRONMENT = "production" }

[env.staging]
vars = { ENVIRONMENT = "staging" }
